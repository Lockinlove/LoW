<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>D&D Monster Stat Block Generator</title>
  </head>
  <body>
    <form id="statblock-form">
      <label for="monster-name">Enter a D&D monster name:</label>
      <input type="text" id="monster-name" name="monster-name">
      <button type="submit" id="generate-button">Generate Stat Block</button>
    </form>
    <div id="statblock-container"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
